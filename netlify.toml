[build]
  base    = "."
  command = "npm install && cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[functions]
  directory             = "netlify/functions"
  node_bundler          = "esbuild"
  included_files        = ["netlify/functions/_shared/**", "schema.sql"]
  external_node_modules = ["@neondatabase/serverless"]

# Scheduled (cron) functions. Each block binds a function name to a cron
# expression. Netlify also picks up `exports.config = { schedule }` inline
# in the function file, but declaring it here is the canonical location
# the build picks up first — keeps schedules visible in one place.
[functions."agent-scanner"]
  schedule = "*/30 * * * *"

[functions."agent-odds-monitor"]
  schedule = "*/10 * * * *"

[functions."agent-results"]
  schedule = "0 */2 * * *"

[functions."agent-accuracy"]
  schedule = "0 3 * * *"

[functions."agent-alerts"]
  schedule = "*/15 * * * *"

[functions."agent-best-bet"]
  schedule = "0 7 * * *"

# Intelligence Evolution agents — daily post-match autopsy + weekly
# pattern mining. Both loop over all active sports from
# netlify/functions/_shared/sports.js.
[functions."agent-autopsy"]
  schedule = "0 4 * * *"

[functions."agent-patterns"]
  schedule = "0 5 * * 1"

[functions."email"]
  schedule = "0 7 * * *"

[build.environment]
  NODE_VERSION           = "20"
  # FRONTEND_URL is the public site URL (e.g. https://fastscore.eu) — used in
  # share links and OAuth redirects, intentionally embedded in client bundles
  # and docs. It is not a secret; omit it from the secrets scanner so the
  # build doesn't fail when the value appears in ShareButtons / docs.
  SECRETS_SCAN_OMIT_KEYS = "NODE_ENV,FOOTBALL_DEFAULT_SEASON,WHOP_CHECKOUT_URL,VITE_WHOP_CHECKOUT_URL,FRONTEND_URL"

# Frontend calls /api/* — rewrite to the matching Netlify Function (same origin, no CORS).
[[redirects]]
  from   = "/api/migrate"
  to     = "/.netlify/functions/migrate"
  status = 200

[[redirects]]
  from   = "/api/admin/clear-history"
  to     = "/.netlify/functions/admin-clear-history"
  status = 200

[[redirects]]
  from   = "/api/auth/*"
  to     = "/.netlify/functions/auth/:splat"
  status = 200

# Weekly read endpoint — match BEFORE the wildcard so /week resolves to
# the predictions function (not a literal subpath).
[[redirects]]
  from   = "/api/predictions/week"
  to     = "/.netlify/functions/predictions/week"
  status = 200

# Progressive-load endpoints — match BEFORE the wildcard below so the
# specific paths win the route lookup. /quick returns fixtures+form+stats
# (no Claude); /analyze runs Claude for a single fixtureId.
[[redirects]]
  from   = "/api/predictions/quick"
  to     = "/.netlify/functions/predictions/quick"
  status = 200

[[redirects]]
  from   = "/api/predictions/analyze"
  to     = "/.netlify/functions/predictions/analyze"
