[build]
  base                   = "."
  command                = "npm install && cd frontend && npm install && npm run build"
  publish                = "frontend/dist"
  SECRETS_SCAN_OMIT_KEYS = ["NODE_ENV"]

[functions]
  directory             = "netlify/functions"
  node_bundler          = "esbuild"
  included_files        = ["netlify/functions/_shared/**"]
  external_node_modules = ["@neondatabase/serverless"]

[build.environment]
  NODE_VERSION = "20"

# Frontend calls /api/* — rewrite to the matching Netlify Function (same origin, no CORS).
[[redirects]]
  from   = "/api/auth/*"
  to     = "/.netlify/functions/auth/:splat"
  status = 200

[[redirects]]
  from   = "/api/predictions/*"
  to     = "/.netlify/functions/predictions/:splat"
  status = 200

[[redirects]]
  from   = "/api/history/*"
  to     = "/.netlify/functions/history/:splat"
  status = 200

[[redirects]]
  from   = "/api/history"
  to     = "/.netlify/functions/history"
  status = 200

[[redirects]]
  from   = "/api/user/*"
  to     = "/.netlify/functions/user/:splat"
  status = 200

[[redirects]]
  from   = "/api/user"
  to     = "/.netlify/functions/user"
  status = 200

[[redirects]]
  from   = "/api/webhook/*"
  to     = "/.netlify/functions/webhook/:splat"
  status = 200

[[redirects]]
  from   = "/api/admin/*"
  to     = "/.netlify/functions/admin/:splat"
  status = 200

[[redirects]]
  from   = "/api/affiliate/*"
  to     = "/.netlify/functions/affiliate/:splat"
  status = 200

[[redirects]]
  from   = "/api/stats/*"
  to     = "/.netlify/functions/stats/:splat"
  status = 200

[[redirects]]
  from   = "/api/blog/*"
  to     = "/.netlify/functions/blog/:splat"
  status = 200

[[redirects]]
  from   = "/api/blog"
  to     = "/.netlify/functions/blog"
  status = 200

[[redirects]]
  from   = "/api/best-bet"
  to     = "/.netlify/functions/best-bet"
  status = 200

[[redirects]]
  from   = "/api/odds/*"
  to     = "/.netlify/functions/odds/:splat"
  status = 200

[[redirects]]
  from   = "/api/odds"
  to     = "/.netlify/functions/odds"
  status = 200

[[redirects]]
  from   = "/api/email/*"
  to     = "/.netlify/functions/email/:splat"
  status = 200

[[redirects]]
  from   = "/api/results/*"
  to     = "/.netlify/functions/results/:splat"
  status = 200

[[redirects]]
  from   = "/api/bankroll"
  to     = "/.netlify/functions/bankroll"
  status = 200

[[redirects]]
  from   = "/api/bankroll/*"
  to     = "/.netlify/functions/bankroll/:splat"
  status = 200

# SPA fallback — every non-API, non-asset path serves index.html.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
